# Example config for k8s-tray-forwarder.
#
# Copy to the active config location and edit, or just use the in-app
# "Add Forward…" window (which writes this same file).
#
# macOS default location:
#   ~/Library/Application Support/k8s-tray-forwarder/config.yaml
# Override with: export K8S_TRAY_FORWARDER_CONFIG=/path/to/config.yaml
#
# Top-level options:
#   launchAtLogin   install a macOS LaunchAgent so the app starts at login
#                   (also toggleable from the Manage window). Defaults to false.
#
# Fields per forward:
#   id          stable identifier (auto-generated by the app if omitted)
#   name        label shown in the tray
#   type        always "kubernetes" for now
#   context     kubeconfig context name
#   namespace   target namespace
#   targetKind  deployment | service | pod
#   targetName  resource name
#   remotePort  port on the target
#   localPort   local port to bind (defaults to remotePort if omitted)
#   address     local bind address (defaults to 127.0.0.1)
#   autoStart   start this forward automatically when the app launches

launchAtLogin: false

# Example: forward an internal PostgreSQL service so you can run queries against
# it locally — point psql or any DB client at 127.0.0.1:5432 (e.g.
# `psql -h 127.0.0.1 -p 5432 -U postgres`) without exposing the database
# outside the cluster.
forwards:
  - id: postgresql
    name: Postgres (project)
    type: kubernetes
    context: personal-k8s
    namespace: project
    targetKind: service
    targetName: postgresql
    remotePort: 5432
    localPort: 5432
    autoStart: true
