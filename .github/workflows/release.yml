# Builds prebuilt macOS binaries with GoReleaser on a version tag and updates
# the laszukdawid/homebrew-tap Homebrew formula.
#
# Runs on macOS because Fyne is a CGO app and cannot be cross-compiled from
# Linux. The arm64 slice builds natively; the amd64 slice is cross-built via
# `clang -arch x86_64` (see .goreleaser.yaml).
#
# Required secret (add to this repo's Actions secrets):
#   HOMEBREW_TAP_GITHUB_TOKEN — a PAT with `repo` scope on laszukdawid/homebrew-tap
#                               so GoReleaser can commit the updated formula.
# GITHUB_TOKEN is provided automatically and is used to create the release here.
name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
