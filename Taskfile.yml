version: '3'

vars:
  APP_NAME: K8s Port Forwards
  BIN: k8s-tray-forwarder
  APP_ID: com.github.dawidlaszuk.k8s-tray-forwarder

tasks:
  default:
    cmds:
      - task --list
    silent: true

  build:
    desc: Compile the binary
    cmds:
      - go build -o {{.BIN}} .

  run:
    desc: Build and run directly (useful while developing)
    cmds:
      - go run .

  test:
    desc: Run unit tests
    cmds:
      - go test ./...

  fmt:
    desc: Format all Go files
    cmds:
      - gofmt -w .

  vet:
    desc: Run go vet
    cmds:
      - go vet ./...

  check:
    desc: Format, vet and test
    deps: [fmt, vet, test]

  install-fyne:
    desc: Install the Fyne packaging CLI (one-time)
    cmds:
      - go install fyne.io/tools/cmd/fyne@latest

  bundle:
    desc: 'Produce a macOS .app bundle (run `task install-fyne` first; needs icon.png)'
    cmds:
      - fyne package -os darwin --name "{{.APP_NAME}}" --app-id {{.APP_ID}} --icon icon.png

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf {{.BIN}} "{{.APP_NAME}}.app"
