version: '3'

vars:
  APP_NAME: K8s Port Forwards
  BIN: k8s-tray-forwarder
  APP_ID: com.github.dawidlaszuk.k8s-tray-forwarder
  REPO: laszukdawid/k8s-tray-forwarder
  TAP: laszukdawid/tap

tasks:
  default:
    cmds:
      - task --list
    silent: true

  build:
    desc: Compile the binary
    cmds:
      - go build -o {{.BIN}} .

  run:
    desc: Build and run directly (useful while developing)
    cmds:
      - go run .

  test:
    desc: Run unit tests
    cmds:
      - go test ./...

  fmt:
    desc: Format all Go files
    cmds:
      - gofmt -w .

  vet:
    desc: Run go vet
    cmds:
      - go vet ./...

  check:
    desc: Format, vet and test
    deps: [fmt, vet, test]

  install-fyne:
    desc: Install the Fyne packaging CLI (one-time)
    cmds:
      - go install fyne.io/tools/cmd/fyne@latest

  bundle:
    desc: 'Produce a macOS .app bundle (run `task install-fyne` first; needs icon.png)'
    cmds:
      - fyne package -os darwin --name "{{.APP_NAME}}" --app-id {{.APP_ID}} --icon icon.png

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf {{.BIN}} "{{.APP_NAME}}.app"

  formula-sha:
    desc: 'Print the sha256 of a release tarball for the Homebrew formula (TAG=v0.1.0)'
    requires:
      vars: [TAG]
    cmds:
      - curl -fsSL "https://github.com/{{.REPO}}/archive/refs/tags/{{.TAG}}.tar.gz" | shasum -a 256 | cut -d' ' -f1

  brew-install:
    desc: 'Install from the tap (use HEAD=1 to build the latest commit)'
    cmds:
      - 'brew install {{if .HEAD}}--HEAD {{end}}{{.TAP}}/{{.BIN}}'
